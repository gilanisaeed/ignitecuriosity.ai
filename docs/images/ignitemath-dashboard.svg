        <rect x="530" y="340" width="180" height="120" rx="10" fill="#ffffff" stroke="#e7e3dd"/>
        <circle cx="556" cy="370" r="14" fill="#ece9f5"/>
        <rect x="580" y="364" width="88" height="9" rx="4.5" fill="#e2dfd9"/>
        <rect x="552" y="398" width="136" height="6" rx="3" fill="#f0ede7"/>
