    <rect x="330" y="536" width="580" height="10" rx="5" fill="#f0ede7"/>
    <rect x="330" y="536" width="360" height="10" rx="5" fill="#f16935"/>
    <text x="926" y="546" font-size="14" font-weight="600" fill="#050c13">62%</text>

