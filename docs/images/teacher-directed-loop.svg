<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- The teacher-directed loop: teacher directs AI, AI scaffolds students, student thinking flows back -->
  <rect width="1200" height="800" fill="#f6f1ea"/>
  <g opacity="0.55" fill="#e7dfd3">
    <circle cx="90" cy="110" r="4"/><circle cx="1120" cy="90" r="4"/><circle cx="150" cy="700" r="4"/>
    <circle cx="1080" cy="680" r="4"/><circle cx="600" cy="60" r="4"/>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9d9dab"/>
    </marker>
  </defs>

  <!-- loop arrows -->
  <path d="M494 262 C400 320 350 380 335 458" stroke="#9d9dab" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M480 596 C560 650 640 650 720 596" stroke="#9d9dab" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M868 460 C852 380 800 320 708 262" stroke="#9d9dab" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- arrow labels -->
  <text x="368" y="342" font-size="17" fill="#505963" transform="rotate(58 388 342)">directs</text>
  <text x="600" y="668" font-size="17" fill="#505963" text-anchor="middle">scaffolds the struggle</text>
  <text x="836" y="336" font-size="17" fill="#505963" transform="rotate(-58 836 336)">visible thinking</text>

  <!-- Teacher card (top) -->
  <g>
    <rect x="470" y="120" width="260" height="140" rx="16" fill="#ffffff" stroke="#dbdee1"/>
    <circle cx="600" cy="168" r="24" fill="#ece9f5"/>
    <circle cx="600" cy="161" r="9" fill="#3e3b6b"/>
    <path d="M582 186 a18 12 0 0 1 36 0 Z" fill="#3e3b6b"/>
    <text x="600" y="220" font-size="19" font-weight="600" fill="#050c13" text-anchor="middle">The teacher</text>
    <text x="600" y="243" font-size="14" fill="#505963" text-anchor="middle">sets the goals and guardrails</text>
  </g>

  <!-- AI card (bottom left) -->
  <g>
    <rect x="210" y="470" width="260" height="140" rx="16" fill="#3e3b6b"/>
    <path d="M340 494 C343.4 512 348.3 516.9 364 519.5 C348.3 522.1 343.4 527 340 545 C336.6 527 331.7 522.1 316 519.5 C331.7 516.9 336.6 512 340 494 Z" fill="#f16935"/>
    <text x="340" y="570" font-size="19" font-weight="600" fill="#ffffff" text-anchor="middle">IgniteMath</text>
    <text x="340" y="593" font-size="14" fill="#c9c6e4" text-anchor="middle">guides, but never gives the answer</text>
  </g>

  <!-- Student card (bottom right) -->
  <g>
    <rect x="730" y="470" width="260" height="140" rx="16" fill="#ffffff" stroke="#dbdee1"/>
    <circle cx="860" cy="518" r="24" fill="#dff1f8"/>
    <circle cx="860" cy="511" r="9" fill="#3b859b"/>
    <path d="M842 536 a18 12 0 0 1 36 0 Z" fill="#3b859b"/>
    <text x="860" y="570" font-size="19" font-weight="600" fill="#050c13" text-anchor="middle">The student</text>
    <text x="860" y="593" font-size="14" fill="#505963" text-anchor="middle">does the reasoning</text>
  </g>
</svg>
